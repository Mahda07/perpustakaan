<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pustaka Digital - Perpustakaan Sekolah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div id="toastMsg" class="fixed bottom-5 right-5 text-white px-5 py-3 rounded-lg shadow-lg z-50 hidden transition"></div>

    <!-- Login Container -->
    <div id="loginContainer" class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
            <div class="bg-indigo-700 text-white py-4 text-center">
                <h1 class="text-2xl font-bold"><i class="fas fa-book-open mr-2"></i> Pustaka Digital</h1>
                <p class="text-indigo-200 text-sm">Sistem Peminjaman Buku Online</p>
            </div>
            
            <div class="flex border-b">
                <button id="tabAdminBtn" class="flex-1 py-3 font-semibold transition tab-active">👑 Admin</button>
                <button id="tabSiswaBtn" class="flex-1 py-3 font-semibold transition tab-inactive">📚 Siswa</button>
            </div>

            <!-- Panel Admin Login (Username + Password) -->
            <div id="panelAdmin" class="p-6 space-y-4">
                <div class="text-center text-sm text-gray-500">Masuk sebagai Administrator</div>
                <input type="text" id="adminUsername" placeholder="Username Admin" value="admin" class="w-full border rounded-lg p-3">
                <input type="password" id="adminPassword" placeholder="Password" value="admin123" class="w-full border rounded-lg p-3">
                <button onclick="loginWithUsername('admin')" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition">Login Admin</button>
                <div class="flex gap-2">
                    <button id="resetAdminBtn" class="w-full bg-red-500 hover:bg-red-600 text-white py-2 rounded-lg text-sm">⚠️ Reset Admin (Buat Ulang)</button>
                </div>
                <p class="text-xs text-center text-gray-400">Default: username = admin , password = admin123</p>
                <div id="adminError" class="text-red-500 text-xs text-center hidden bg-red-50 p-2 rounded"></div>
            </div>

            <!-- Panel Siswa (Login & Register dengan Username) -->
            <div id="panelSiswa" class="p-6 space-y-4 hidden">
                <div class="flex border-b mb-4">
                    <button id="siswaLoginTab" class="flex-1 py-2 text-center font-medium text-indigo-600 border-b-2 border-indigo-600">Login Siswa</button>
                    <button id="siswaRegisterTab" class="flex-1 py-2 text-center font-medium text-gray-500">Daftar Siswa</button>
                </div>
                <!-- Form Login Siswa -->
                <div id="siswaLoginForm" class="space-y-4">
                    <input type="text" id="siswaUsername" placeholder="Username" class="w-full border rounded-lg p-3">
                    <input type="password" id="siswaPassword" placeholder="Password" class="w-full border rounded-lg p-3">
                    <button onclick="loginWithUsername('siswa')" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-lg transition">Login Siswa</button>
                </div>
                <!-- Form Register Siswa (Username, Nama, NIS, Password) -->
                <div id="siswaRegisterForm" class="space-y-4 hidden">
                    <input type="text" id="regUsername" placeholder="Username (unik)" class="w-full border rounded-lg p-3">
                    <input type="text" id="regNama" placeholder="Nama Lengkap" class="w-full border rounded-lg p-3">
                    <input type="text" id="regNis" placeholder="NIS" class="w-full border rounded-lg p-3">
                    <input type="password" id="regPasswordSiswa" placeholder="Password" class="w-full border rounded-lg p-3">
                    <button onclick="registerSiswa()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition">Daftar Akun</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App Container (setelah login) -->
    <div id="appContainer" class="hidden min-h-screen w-full"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
