<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

    <script src="https://cdn.tailwindcss.com"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
        import { getFirestore, collection, doc, getDocs, getDoc, addDoc, updateDoc, deleteDoc, query, where, orderBy, Timestamp, setDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfqZD7UZZt-GWmtNhfJyksrv3-8ENRjto",
            authDomain: "insan-cemerlang-d5574.firebaseapp.com",
            projectId: "insan-cemerlang-d5574",
            storageBucket: "insan-cemerlang-d5574.appspot.com",
            messagingSenderId: "1035937160050",
            appId: "1:1035937160050:web:6d77d3874c3f78b2811beb",
            measurementId: "G-EVVQ80Q08C"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ------------------------ DEFAULT ADMIN ------------------------
        async function createDefaultAdminIfNeeded() {
            const adminEmail = "admin@perpustakaan.com";
            const adminPass = "admin123";
            const adminName = "Administrator Utama";
            
            try {
                // Cek apakah sudah ada user dengan role admin di Firestore
                const adminQuery = query(collection(db, "users"), where("role", "==", "admin"));
                const adminSnapshot = await getDocs(adminQuery);
                
                if (adminSnapshot.empty) {
                    // Tidak ada admin, coba buat akun Auth
                    let userCred;
                    try {
                        userCred = await createUserWithEmailAndPassword(auth, adminEmail, adminPass);
                    } catch (authError) {
                        if (authError.code === 'auth/email-already-in-use') {
                            // Email sudah terdaftar di Auth, kita cari user tersebut
                            const signInCred = await signInWithEmailAndPassword(auth, adminEmail, adminPass);
                            userCred = signInCred;
                        } else {
                            throw authError;
                        }
                    }
                    
                    // Simpan data admin ke Firestore
                    const userUid = userCred.user.uid;
                    // Cek apakah sudah ada dokumen dengan uid ini
                    const userQueryUid = query(collection(db, "users"), where("uid", "==", userUid));
                    const userExist = await getDocs(userQueryUid);
                    if (userExist.empty) {
                        await addDoc(collection(db, "users"), {
                            uid: userUid,
                            email: adminEmail,
                            name: adminName,
                            nis: "ADMIN001",
                            role: "admin"
                        });
                        console.log("Admin default berhasil dibuat");
                    } else {
                        // update role jika ternyata bukan admin
                        const docRef = userExist.docs[0].ref;
                        await updateDoc(docRef, { role: "admin", name: adminName });
                    }
                }
            } catch (error) {
                console.error("Gagal membuat admin default:", error);
            }
        }

        // Panggil fungsi inisialisasi admin saat aplikasi mulai
        createDefaultAdminIfNeeded();

        // ======================== GLOBAL STATE ========================
        let currentUserObj = null;
        let currentUserRole = null;
        let currentUserDocId = null;
        let currentMenu = "dashboard";

        const loginContainer = document.getElementById('loginContainer');
        const appContainer = document.getElementById('appContainer');
        const pageTitle = document.getElementById('pageTitle');
        const mainContent = document.getElementById('mainContent');
        const userInfoSpan = document.getElementById('userInfoSpan');
        const userRoleSpan = document.getElementById('userRoleSpan');
        const dynamicMenu = document.getElementById('dynamicMenu');

        window.logout = async () => {
            await signOut(auth);
            resetToLogin();
        };

        function resetToLogin() {
            loginContainer.classList.remove('hidden');
            appContainer.classList.add('hidden');
            currentUserObj = null;
            currentUserRole = null;
            currentUserDocId = null;
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toastMsg');
            toast.innerText = msg;
            toast.classList.remove('hidden', 'bg-red-500', 'bg-green-500', 'bg-blue-500');
            if (type === 'error') toast.classList.add('bg-red-500');
            else if (type === 'info') toast.classList.add('bg-blue-500');
            else toast.classList.add('bg-green-500');
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        function renderMenu() {
            if (currentUserRole === 'admin') {
                dynamicMenu.innerHTML = `
                    <button data-menu="dashboard" class="menu-btn w-full text-left px-4 py-2 rounded-lg mb-1 flex items-center gap-3 hover:bg-indigo-700 transition"><i class="fas fa-tachometer-alt w-5"></i> Dashboard</button>
                    <button data-menu="books" class="menu-btn w-full text-left px-4 py-2 rounded-lg mb-1 flex items-center gap-3 hover:bg-indigo-700 transition"><i class="fas fa-book w-5"></i> Kelola Buku</button>
                    <button data-menu="members" class="menu-btn w-full text-left px-4 py-2 rounded-lg mb-1 flex items-center gap-3 hover:bg-indigo-700 transition"><i class="fas fa-users w-5"></i> Kelola Anggota</button>
                    <button data-menu="transactions" class="menu-btn w-full text-left px-4 py-2 rounded-lg mb-1 flex items-center gap-3 hover:bg-indigo-700 transition"><i class="fas fa-exchange-alt w-5"></i> Kelola Transaksi</button>
                    <button data-menu="docs" class="menu-btn w-full text-left px-4 py-2 rounded-lg mb-1 flex items-center gap-3 hover:bg-indigo-700 transition"><i class="fas fa-file-alt w-5"></i> Dokumentasi</button>
                `;
            } else {
                dynamicMenu.innerHTML = `
                    <button data-menu="dashboard" class="menu-btn w-full text-left px-4 py-2 rounded-lg mb-1 flex items-center gap-3 hover:bg-indigo-700 transition"><i class="fas fa-home w-5"></i> Dashboard Buku</button>
                    <button data-menu="my-borrow" class="menu-btn w-full text-left px-4 py-2 rounded-lg mb-1 flex items-center gap-3 hover:bg-indigo-700 transition"><i class="fas fa-hand-holding-heart w-5"></i> Peminjaman Saya</button>
                    <button data-menu="return-book" class="menu-btn w-full text-left px-4 py-2 rounded-lg mb-1 flex items-center gap-3 hover:bg-indigo-700 transition"><i class="fas fa-undo-alt w-5"></i> Pengembalian</button>
                    <button data-menu="docs" class="menu-btn w-full text-left px-4 py-2 rounded-lg mb-1 flex items-center gap-3 hover:bg-indigo-700 transition"><i class="fas fa-file-alt w-5"></i> Dokumentasi</button>
                `;
            }
            document.querySelectorAll('.menu-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const menu = btn.getAttribute('data-menu');
                    if (menu) changeMenu(menu);
                });
            });
        }

        async function changeMenu(menuId) {
            currentMenu = menuId;
            if (menuId === 'dashboard') {
                if (currentUserRole === 'admin') await renderAdminDashboard();
                else await renderUserDashboard();
            } else if (menuId === 'books') await renderBooksManagement();
            else if (menuId === 'members') await renderMembersManagement();
            else if (menuId === 'transactions') await renderTransactionsManagement();
            else if (menuId === 'my-borrow') await renderUserBorrowed();
            else if (menuId === 'return-book') await renderUserReturn();
            else if (menuId === 'docs') renderDocumentation();
        }

        // ======================== FUNGSI BUKU ========================
        async function loadBooks(searchTerm = '') {
            let q = collection(db, 'books');
            let snapshot = await getDocs(q);
            let books = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                return books.filter(b => (b.title?.toLowerCase().includes(term) || b.author?.toLowerCase().includes(term)));
            }
            return books;
        }

        async function renderBooksManagement() {
            mainContent.innerHTML = `<div class="bg-white rounded-xl shadow p-6"><div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold"><i class="fas fa-book"></i> Manajemen Buku</h2><button id="addBookBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-lg"><i class="fas fa-plus"></i> Tambah Buku</button></div><div class="mb-4"><input type="text" id="searchBookInput" placeholder="Cari judul/pengarang..." class="border p-2 rounded w-full md:w-64"><button id="searchBookBtn" class="ml-2 bg-gray-600 text-white px-4 py-2 rounded">Cari</button></div><div id="booksTableContainer">Loading...</div></div>`;
            await refreshBooksTable();
            document.getElementById('addBookBtn').onclick = () => showBookForm();
            document.getElementById('searchBookBtn').onclick = async () => {
                const term = document.getElementById('searchBookInput').value;
                await refreshBooksTable(term);
            };
        }

        async function refreshBooksTable(search = '') {
            const container = document.getElementById('booksTableContainer');
            const books = await loadBooks(search);
            if (books.length === 0) { container.innerHTML = '<p class="text-gray-500">Tidak ada data buku.</p>'; return; }
            let html = `<table class="min-w-full bg-white border"><thead><tr class="bg-gray-100"><th class="p-2">Judul</th><th>Pengarang</th><th>Tahun</th><th>Stok</th><th>Aksi</th></tr></thead><tbody>`;
            books.forEach(book => {
                html += `<tr class="border-b"><td class="p-2">${book.title || '-'}</td><td>${book.author || '-'}</td><td>${book.year || '-'}</td><td>${book.stock || 0}</td><td><button class="editBook bg-yellow-500 text-white px-2 py-1 rounded mr-1" data-id="${book.id}">Edit</button><button class="deleteBook bg-red-500 text-white px-2 py-1 rounded" data-id="${book.id}">Hapus</button></td></tr>`;
            });
            html += `</tbody></table>`;
            container.innerHTML = html;
            document.querySelectorAll('.editBook').forEach(btn => btn.addEventListener('click', () => showBookForm(btn.getAttribute('data-id'))));
            document.querySelectorAll('.deleteBook').forEach(btn => btn.addEventListener('click', async () => { if(confirm('Yakin hapus buku?')) await deleteBook(btn.getAttribute('data-id')); }));
        }

        async function showBookForm(bookId = null) {
            let title = '', author = '', year = '', stock = 0;
            if (bookId) {
                const docRef = doc(db, 'books', bookId);
                const snap = await getDoc(docRef);
                if (snap.exists()) { title = snap.data().title; author = snap.data().author; year = snap.data().year; stock = snap.data().stock; }
            }
            const formHtml = `
                <div id="bookModal" class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50">
                    <div class="bg-white rounded-lg p-6 w-96"><h3 class="text-lg font-bold mb-3">${bookId ? 'Edit Buku' : 'Tambah Buku'}</h3>
                    <input id="bookTitle" placeholder="Judul" value="${title.replace(/"/g, '&quot;')}" class="border p-2 w-full mb-2"><input id="bookAuthor" placeholder="Pengarang" value="${author}" class="border p-2 w-full mb-2"><input id="bookYear" placeholder="Tahun" value="${year}" class="border p-2 w-full mb-2"><input id="bookStock" placeholder="Stok" value="${stock}" class="border p-2 w-full mb-2" type="number">
                    <div class="flex justify-end gap-2"><button id="cancelModal" class="bg-gray-400 px-4 py-2 rounded">Batal</button><button id="saveBookBtn" class="bg-indigo-600 text-white px-4 py-2 rounded">Simpan</button></div></div></div>
            `;
            document.body.insertAdjacentHTML('beforeend', formHtml);
            const modal = document.getElementById('bookModal');
            document.getElementById('cancelModal').onclick = () => modal.remove();
            document.getElementById('saveBookBtn').onclick = async () => {
                const newData = { title: document.getElementById('bookTitle').value, author: document.getElementById('bookAuthor').value, year: document.getElementById('bookYear').value, stock: parseInt(document.getElementById('bookStock').value) || 0 };
                if (bookId) await updateDoc(doc(db, 'books', bookId), newData);
                else await addDoc(collection(db, 'books'), newData);
                modal.remove(); showToast('Buku tersimpan'); await refreshBooksTable();
            };
        }

        async function deleteBook(id) { await deleteDoc(doc(db, 'books', id)); showToast('Buku dihapus'); await refreshBooksTable(); }

        // ======================== KELOLA ANGGOTA ========================
        async function renderMembersManagement() {
            mainContent.innerHTML = `<div class="bg-white rounded-xl shadow p-6"><div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold"><i class="fas fa-users"></i> Kelola Anggota (User)</h2><button id="addMemberBtn" class="bg-indigo-600 text-white px-4 py-2 rounded"><i class="fas fa-user-plus"></i> Tambah Anggota</button></div><div id="membersTable">Memuat...</div></div>`;
            await refreshMembersTable();
            document.getElementById('addMemberBtn').onclick = () => showMemberForm();
        }

        async function refreshMembersTable() {
            const q = query(collection(db, 'users'), where('role', '==', 'user'));
            const snap = await getDocs(q);
            const members = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            const container = document.getElementById('membersTable');
            if (members.length === 0) { container.innerHTML = '<p>Belum ada anggota.</p>'; return; }
            let html = `<table class="min-w-full border"><thead><tr class="bg-gray-100"><th>Nama</th><th>Email</th><th>NIS</th><th>Aksi</th></tr></thead><tbody>`;
            members.forEach(m => {
                html += `<tr><td class="p-2">${m.name || '-'}</td><td>${m.email}</td><td>${m.nis || '-'}</td><td><button class="editMember bg-yellow-500 px-2 py-1 rounded" data-id="${m.id}">Edit</button> <button class="deleteMember bg-red-500 px-2 py-1 rounded" data-id="${m.id}">Hapus</button></td></tr>`;
            });
            html += `</tbody></table>`;
            container.innerHTML = html;
            document.querySelectorAll('.editMember').forEach(btn => btn.addEventListener('click', () => showMemberForm(btn.getAttribute('data-id'))));
            document.querySelectorAll('.deleteMember').forEach(btn => btn.addEventListener('click', async () => { if(confirm('Nonaktifkan anggota?')) await deleteMember(btn.getAttribute('data-id')); }));
        }

        async function showMemberForm(memberId = null) {
            let name = '', nis = '', email = '';
            if (memberId) {
                const snap = await getDoc(doc(db, 'users', memberId));
                if (snap.exists()) { name = snap.data().name; nis = snap.data().nis; email = snap.data().email; }
            }
            const formHtml = `<div id="memberModal" class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50"><div class="bg-white p-6 rounded w-96"><h3 class="font-bold">${memberId ? 'Edit Anggota' : 'Tambah Anggota'}</h3>
            ${!memberId ? '<input id="regEmail" placeholder="Email" class="border p-2 w-full my-2"><input id="regPassword" type="password" placeholder="Password" class="border p-2 w-full my-2">' : ''}
            <input id="memberName" placeholder="Nama Lengkap" value="${name}" class="border p-2 w-full my-2"><input id="memberNis" placeholder="NIS" value="${nis}" class="border p-2 w-full my-2">
            <div class="flex justify-end gap-2"><button id="cancelMemberModal" class="bg-gray-400 px-3 py-1 rounded">Batal</button><button id="saveMemberBtn" class="bg-indigo-600 text-white px-3 py-1 rounded">Simpan</button></div></div></div>`;
            document.body.insertAdjacentHTML('beforeend', formHtml);
            const modal = document.getElementById('memberModal');
            document.getElementById('cancelMemberModal').onclick = () => modal.remove();
            document.getElementById('saveMemberBtn').onclick = async () => {
                const newName = document.getElementById('memberName').value;
                const newNis = document.getElementById('memberNis').value;
                if (memberId) {
                    await updateDoc(doc(db, 'users', memberId), { name: newName, nis: newNis });
                    showToast('Anggota diperbarui');
                } else {
                    const emailVal = document.getElementById('regEmail').value;
                    const passVal = document.getElementById('regPassword').value;
                    if (!emailVal || !passVal) { showToast('Email & password wajib', 'error'); return; }
                    try {
                        const userCred = await createUserWithEmailAndPassword(auth, emailVal, passVal);
                        await addDoc(collection(db, 'users'), { uid: userCred.user.uid, email: emailVal, name: newName, nis: newNis, role: 'user' });
                        showToast('Anggota berhasil ditambahkan');
                    } catch(err) { showToast('Gagal daftar: '+err.message, 'error'); modal.remove(); return; }
                }
                modal.remove();
                await refreshMembersTable();
            };
        }

        async function deleteMember(id) { await deleteDoc(doc(db, 'users', id)); showToast('Anggota dihapus'); await refreshMembersTable(); }

        // ======================== TRANSAKSI ADMIN ========================
        async function renderTransactionsManagement() {
            mainContent.innerHTML = `<div class="bg-white rounded-xl shadow p-6"><h2 class="text-xl font-bold mb-3"><i class="fas fa-history"></i> Semua Transaksi Peminjaman</h2><button id="newTransBtn" class="bg-green-600 text-white px-4 py-2 rounded mb-4"><i class="fas fa-plus"></i> Tambah Peminjaman</button><div id="transactionsList">Memuat...</div></div>`;
            await refreshTransactionsTable();
            document.getElementById('newTransBtn').onclick = () => showCreateTransactionForm();
        }

        async function refreshTransactionsTable() {
            const snap = await getDocs(collection(db, 'transactions'));
            let transactions = [];
            for (const docSnap of snap.docs) {
                const data = docSnap.data();
                let userName = 'Tidak dikenal', bookTitle = 'Tidak dikenal';
                const userDoc = await getDoc(doc(db, 'users', data.userId)).catch(()=>null);
                if (userDoc?.exists()) userName = userDoc.data().name || userDoc.data().email;
                const bookDoc = await getDoc(doc(db, 'books', data.bookId)).catch(()=>null);
                if (bookDoc?.exists()) bookTitle = bookDoc.data().title;
                transactions.push({ id: docSnap.id, ...data, userName, bookTitle });
            }
            const container = document.getElementById('transactionsList');
            if (transactions.length === 0) { container.innerHTML = '<p>Belum ada transaksi.</p>'; return; }
            let html = `<table class="w-full border"><thead><tr class="bg-gray-100"><th>Peminjam</th><th>Buku</th><th>Tgl Pinjam</th><th>Status</th><th>Aksi</th></tr></thead><tbody>`;
            transactions.forEach(t => {
                const statusBadge = t.status === 'borrowed' ? '<span class="bg-yellow-200 text-yellow-800 px-2 rounded">Dipinjam</span>' : '<span class="bg-green-200 text-green-800 px-2 rounded">Dikembalikan</span>';
                html += `<tr><td class="p-2">${t.userName}</td><td>${t.bookTitle}</td><td>${t.borrowDate ? new Date(t.borrowDate.seconds*1000).toLocaleDateString() : '-'}</td><td>${statusBadge}</td><td>${t.status === 'borrowed' ? `<button class="returnTransBtn bg-blue-500 text-white px-2 py-1 rounded" data-id="${t.id}">Kembalikan</button>` : '-'}</td></tr>`;
            });
            html += `</tbody></table>`;
            container.innerHTML = html;
            document.querySelectorAll('.returnTransBtn').forEach(btn => btn.addEventListener('click', async () => { await returnTransaction(btn.getAttribute('data-id')); }));
        }

        async function showCreateTransactionForm() {
            const booksSnap = await getDocs(collection(db, 'books'));
            const books = booksSnap.docs.map(d => ({ id: d.id, title: d.data().title, stock: d.data().stock }));
            const usersSnap = await getDocs(query(collection(db, 'users'), where('role', '==', 'user')));
            const users = usersSnap.docs.map(d => ({ id: d.id, name: d.data().name || d.data().email }));
            const formHtml = `<div id="transModal" class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50"><div class="bg-white p-6 rounded w-96"><h3 class="font-bold">Tambah Peminjaman</h3>
            <select id="transUserId" class="border p-2 w-full my-2"><option value="">Pilih Anggota</option>${users.map(u => `<option value="${u.id}">${u.name}</option>`).join('')}</select>
            <select id="transBookId" class="border p-2 w-full my-2"><option value="">Pilih Buku (Stok tersedia)</option>${books.filter(b=>b.stock>0).map(b=>`<option value="${b.id}">${b.title} (Stok:${b.stock})</option>`).join('')}</select>
            <div class="flex justify-end gap-2"><button id="cancelTrans" class="bg-gray-400 px-3 py-1 rounded">Batal</button><button id="saveTrans" class="bg-indigo-600 text-white px-3 py-1 rounded">Pinjam</button></div></div></div>`;
            document.body.insertAdjacentHTML('beforeend', formHtml);
            const modal = document.getElementById('transModal');
            document.getElementById('cancelTrans').onclick = () => modal.remove();
            document.getElementById('saveTrans').onclick = async () => {
                const userId = document.getElementById('transUserId').value;
                const bookId = document.getElementById('transBookId').value;
                if (!userId || !bookId) { showToast('Pilih anggota dan buku', 'error'); return; }
                const bookRef = doc(db, 'books', bookId);
                const bookSnap = await getDoc(bookRef);
                if (bookSnap.data().stock <= 0) { showToast('Stok habis', 'error'); modal.remove(); return; }
                await addDoc(collection(db, 'transactions'), { userId, bookId, borrowDate: Timestamp.now(), status: 'borrowed' });
                await updateDoc(bookRef, { stock: bookSnap.data().stock - 1 });
                showToast('Transaksi peminjaman berhasil');
                modal.remove();
                await refreshTransactionsTable();
            };
        }

        async function returnTransaction(transId) {
            const transRef = doc(db, 'transactions', transId);
            const transSnap = await getDoc(transRef);
            if (!transSnap.exists()) return;
            const data = transSnap.data();
            if (data.status !== 'borrowed') return;
            await updateDoc(transRef, { status: 'returned', returnDate: Timestamp.now() });
            const bookRef = doc(db, 'books', data.bookId);
            const bookSnap = await getDoc(bookRef);
            if (bookSnap.exists()) await updateDoc(bookRef, { stock: (bookSnap.data().stock || 0) + 1 });
            showToast('Buku dikembalikan');
            await refreshTransactionsTable();
        }

        // ======================== USER ========================
        async function renderUserDashboard() {
            mainContent.innerHTML = `<div class="bg-white rounded-xl shadow p-6"><h2 class="text-xl font-bold">📚 Daftar Buku Perpustakaan</h2><div class="my-3"><input id="searchUserBook" placeholder="Cari judul/pengarang" class="border p-2 rounded w-full md:w-64"><button id="searchBtnUser" class="bg-gray-700 text-white px-4 py-2 rounded">Cari</button></div><div id="userBooksList">Memuat buku...</div></div>`;
            await refreshUserBookList();
            document.getElementById('searchBtnUser').onclick = async () => {
                const term = document.getElementById('searchUserBook').value;
                await refreshUserBookList(term);
            };
        }

        async function refreshUserBookList(search='') {
            const books = await loadBooks(search);
            const container = document.getElementById('userBooksList');
            if (books.length === 0) { container.innerHTML = '<p>Tidak ada buku.</p>'; return; }
            let html = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-4">`;
            for (const book of books) {
                html += `<div class="border rounded-lg p-4 shadow"><h3 class="font-bold text-lg">${book.title}</h3><p>Pengarang: ${book.author}</p><p>Tahun: ${book.year}</p><p>Stok: ${book.stock}</p>${book.stock > 0 ? `<button class="borrowNowBtn bg-indigo-600 text-white px-3 py-1 rounded mt-2" data-bookid="${book.id}" data-title="${book.title}">Pinjam Buku</button>` : '<span class="text-red-500">Stok habis</span>'}</div>`;
            }
            html += `</div>`;
            container.innerHTML = html;
            document.querySelectorAll('.borrowNowBtn').forEach(btn => btn.addEventListener('click', async () => { await borrowBook(btn.getAttribute('data-bookid')); }));
        }

        async function borrowBook(bookId) {
            const bookRef = doc(db, 'books', bookId);
            const bookSnap = await getDoc(bookRef);
            if (!bookSnap.exists() || bookSnap.data().stock <= 0) { showToast('Stok tidak tersedia', 'error'); return; }
            const qTrans = query(collection(db, 'transactions'), where('userId', '==', currentUserDocId), where('bookId', '==', bookId), where('status', '==', 'borrowed'));
            const snap = await getDocs(qTrans);
            if (!snap.empty) { showToast('Anda masih meminjam buku ini', 'error'); return; }
            await addDoc(collection(db, 'transactions'), { userId: currentUserDocId, bookId, borrowDate: Timestamp.now(), status: 'borrowed' });
            await updateDoc(bookRef, { stock: bookSnap.data().stock - 1 });
            showToast('Berhasil meminjam buku');
            await refreshUserBookList();
        }

        async function renderUserBorrowed() {
            const q = query(collection(db, 'transactions'), where('userId', '==', currentUserDocId), where('status', '==', 'borrowed'));
            const snap = await getDocs(q);
            let html = `<div class="bg-white p-6 rounded shadow"><h2 class="text-xl font-bold">📖 Buku yang Sedang Dipinjam</h2>`;
            if (snap.empty) html += `<p class="mt-3">Tidak ada buku dipinjam.</p>`;
            else {
                html += `<div class="overflow-x-auto"><table class="w-full border mt-3"><thead><tr><th>Judul Buku</th><th>Tanggal Pinjam</th><th>Aksi</th></tr></thead><tbody>`;
                for (const docTrans of snap.docs) {
                    const trans = docTrans.data();
                    const bookDoc = await getDoc(doc(db, 'books', trans.bookId));
                    const title = bookDoc.exists() ? bookDoc.data().title : 'Buku dihapus';
                    const date = trans.borrowDate ? new Date(trans.borrowDate.seconds*1000).toLocaleDateString() : '-';
                    html += `<tr><td class="p-2">${title}</td><td>${date}</td><td><button class="returnUserBtn bg-green-600 text-white px-2 py-1 rounded" data-trans="${docTrans.id}" data-book="${trans.bookId}">Kembalikan</button></td></tr>`;
                }
                html += `</tbody></table>`;
            }
            html += `</div>`;
            mainContent.innerHTML = html;
            document.querySelectorAll('.returnUserBtn').forEach(btn => btn.addEventListener('click', async () => { await returnUserBook(btn.getAttribute('data-trans'), btn.getAttribute('data-book')); }));
        }

        async function returnUserBook(transId, bookId) {
            const transRef = doc(db, 'transactions', transId);
            await updateDoc(transRef, { status: 'returned', returnDate: Timestamp.now() });
            const bookRef = doc(db, 'books', bookId);
            const bookSnap = await getDoc(bookRef);
            if (bookSnap.exists()) await updateDoc(bookRef, { stock: bookSnap.data().stock + 1 });
            showToast('Pengembalian sukses');
            await renderUserBorrowed();
        }

        async function renderUserReturn() { await renderUserBorrowed(); }

        function renderDocumentation() {
            mainContent.innerHTML = `<div class="bg-white p-6 rounded-xl shadow space-y-4"><h2 class="text-2xl font-bold">📄 Dokumentasi Sistem</h2>
            <div><h3 class="font-semibold text-lg">🔹 ERD (Entity Relationship Diagram)</h3><p><strong>Collections:</strong> users (uid, email, name, nis, role), books (title, author, year, stock), transactions (userId, bookId, borrowDate, returnDate, status). Relasi: users 1..* transactions, books 1..* transactions.</p></div>
            <div><h3 class="font-semibold text-lg">🔹 Deskripsi Program</h3><p>Aplikasi web perpustakaan digital berbasis Firebase. Admin dapat mengelola buku, anggota, transaksi. User dapat meminjam/mengembalikan buku, pencarian. Semua data realtime.</p></div>
            <div><h3 class="font-semibold text-lg">🔹 Fungsi / Prosedur Utama</h3><ul class="list-disc ml-6"><li>CRUD Buku: tambah, edit, hapus, cari.</li><li>CRUD Anggota: tambah user via auth+firestore, edit, hapus.</li><li>CRUD Transaksi: peminjaman, pengembalian, stok otomatis.</li><li>Autentikasi Login/Register berbasis role (admin/user).</li></ul></div>
            <div><h3 class="font-semibold text-lg">🔹 Debugging</h3><p>Validasi input, pengecekan stok sebelum pinjam, transaksi ganda dihindari. Error handling menggunakan try-catch dan notifikasi toast.</p></div></div>`;
        }

        async function renderAdminDashboard() { mainContent.innerHTML = `<div class="bg-white p-6 rounded shadow"><h2 class="text-2xl font-bold">Selamat Datang Admin</h2><p class="mt-2">Gunakan menu samping untuk mengelola data perpustakaan.</p></div>`; }

        // Auth state observer
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userQuery = query(collection(db, 'users'), where('uid', '==', user.uid));
                const snap = await getDocs(userQuery);
                if (snap.empty) { await signOut(auth); showToast('Akun tidak terdaftar di sistem', 'error'); return; }
                const userData = snap.docs[0].data();
                currentUserObj = user;
                currentUserDocId = snap.docs[0].id;
                currentUserRole = userData.role;
                userInfoSpan.innerText = userData.name || user.email;
                userRoleSpan.innerText = currentUserRole === 'admin' ? 'Administrator' : 'Siswa';
                loginContainer.classList.add('hidden');
                appContainer.classList.remove('hidden');
                renderMenu();
                await changeMenu('dashboard');
            } else {
                resetToLogin();
            }
        });

        window.handleLogin = async () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                showToast('Login berhasil');
            } catch(e) { showToast('Gagal login: '+e.message, 'error'); }
        };
        window.handleRegister = async () => {
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPassword').value;
            const name = document.getElementById('regName').value;
            const nis = document.getElementById('regNis').value;
            if (!email || !pass) { showToast('Isi email dan password', 'error'); return; }
            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, pass);
                await addDoc(collection(db, 'users'), { uid: userCred.user.uid, email, name: name || 'Siswa', nis: nis || '-', role: 'user' });
                showToast('Registrasi berhasil, silakan login');
            } catch(e) { showToast('Registrasi gagal: '+e.message, 'error'); }
        };
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="toastMsg" class="fixed bottom-5 right-5 text-white px-5 py-3 rounded-lg shadow-lg z-50 hidden transition"></div>
    <!-- Login & Register -->
    <div id="loginContainer" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
            <h2 class="text-3xl font-bold text-center text-indigo-700 mb-6">📚 Pustaka Digital</h2>
            <div class="space-y-4">
                <input type="text" id="loginEmail" placeholder="Email" class="w-full border rounded-lg p-3">
                <input type="password" id="loginPassword" placeholder="Password" class="w-full border rounded-lg p-3">
                <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold">Login</button>
                <hr>
                <p class="text-center font-semibold">Daftar Akun Baru (Siswa)</p>
                <input type="text" id="regEmail" placeholder="Email" class="w-full border rounded-lg p-2">
                <input type="password" id="regPassword" placeholder="Password" class="w-full border rounded-lg p-2">
                <input type="text" id="regName" placeholder="Nama Lengkap" class="w-full border rounded-lg p-2">
                <input type="text" id="regNis" placeholder="NIS" class="w-full border rounded-lg p-2">
                <button onclick="handleRegister()" class="w-full bg-green-600 text-white py-2 rounded-lg">Daftar</button>
                <p class="text-xs text-center text-gray-400 mt-2">Login Admin: admin@perpustakaan.com / admin123</p>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="appContainer" class="hidden min-h-screen flex flex-col md:flex-row">
        <aside class="bg-indigo-800 text-white w-full md:w-72 p-5 space-y-6">
            <div class="text-2xl font-bold"><i class="fas fa-book-open"></i> Pustaka</div>
            <div class="space-y-1" id="dynamicMenu"></div>
            <div class="pt-10 border-t border-indigo-600 text-sm">
                <div><i class="fas fa-user-circle"></i> <span id="userInfoSpan"></span></div>
                <div><i class="fas fa-tag"></i> <span id="userRoleSpan"></span></div>
                <button onclick="logout()" class="mt-3 w-full bg-red-500 py-2 rounded-lg"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </aside>
        <main class="flex-1 p-6">
            <div id="pageTitle" class="mb-4 text-2xl font-semibold text-gray-700"></div>
            <div id="mainContent"></div>
        </main>
    </div>
    <script>
        window.changeMenu = (m) => { if(document.getElementById('pageTitle')) document.getElementById('pageTitle').innerText = { dashboard:'Beranda', books:'Manajemen Buku', members:'Kelola Anggota', transactions:'Transaksi', 'my-borrow':'Peminjaman Saya', 'return-book':'Pengembalian', docs:'Dokumentasi' }[m] || 'Dashboard'; };
    </script>
</body>
</html>
