<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>📚 Perpustakaan Insan Cemerlang</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Auth Container -->
<div id="authContainer" class="auth-container">
  <div class="auth-card">
    <h2>📚 Perpustakaan Insan Cemerlang</h2>
    <div class="mode-tabs">
      <div class="mode-tab active" data-mode="login">Login</div>
      <div class="mode-tab" data-mode="register">Daftar Anggota</div>
    </div>
    <div id="loginForm">
      <input type="text" id="loginUsername" placeholder="Username">
      <div class="password-wrapper">
        <input type="password" id="loginPassword" placeholder="Password">
        <i class="fas fa-eye toggle-password" data-target="loginPassword"></i>
      </div>
      <div class="role-select" id="loginRoleSelect">
        <label><input type="radio" name="loginRole" value="admin" checked> Admin</label>
        <label><input type="radio" name="loginRole" value="anggota"> Anggota</label>
      </div>
      <button id="authSubmitBtn">Masuk</button>
    </div>
    <div id="registerForm" style="display:none;">
      <input type="text" id="regUsername" placeholder="Username">
      <input type="text" id="regFullname" placeholder="Nama Lengkap">
      <input type="email" id="regEmail" placeholder="Email">
      <select id="regKelas">
        <option value="">Pilih Kelas</option>
        <option>X IPA 1</option><option>X IPA 2</option><option>XI IPA 1</option><option>XI IPA 2</option>
        <option>XII IPA 1</option><option>XII IPA 2</option><option>X IPS 1</option><option>X IPS 2</option>
      </select>
      <div class="password-wrapper">
        <input type="password" id="regPassword" placeholder="Password">
        <i class="fas fa-eye toggle-password" data-target="regPassword"></i>
      </div>
      <div class="password-wrapper">
        <input type="password" id="regConfirmPassword" placeholder="Konfirmasi Password">
        <i class="fas fa-eye toggle-password" data-target="regConfirmPassword"></i>
      </div>
      <button id="registerBtn">Daftar sebagai Anggota</button>
    </div>
    <div id="authError" class="error-msg"></div>
    <div id="authInfo" class="info-msg"></div>
  </div>
</div>

<!-- Dashboard Container -->
<div id="dashboardContainer" style="display: none;">
  <div class="dashboard-container">
    <div class="header">
      <div class="user-info"><i class="fas fa-user-circle fa-2x"></i><span id="userNameDisplay"></span> (<span id="userRoleDisplay"></span>) <span id="userKelasDisplay" style="font-size:0.8rem;"></span></div>
      <div>
        <button class="btn-header" id="changePasswordBtn"><i class="fas fa-key"></i> Ubah Password</button>
        <button class="back-btn btn-header" id="backToLoginBtn"><i class="fas fa-arrow-left"></i> Kembali</button>
        <button class="logout-btn btn-header" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>
    <div id="menuContainer" class="menu-grid"></div>
    <div class="content-panel" id="contentPanel"></div>
  </div>
</div>

<!-- Modal Umum -->
<div id="genericModal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Form</h3>
    <div id="modalBody"></div>
    <div style="display: flex; gap: 1rem; margin-top: 1rem;">
      <button id="modalSaveBtn" class="btn-primary">Simpan</button>
      <button id="modalCloseBtn" style="background:#ccc; border:none; padding:0.5rem; border-radius:2rem;">Batal</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script type="module" src="main.js"></script>
</body>
</html>
